name: Codex

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

jobs:
  codex:
    # Only if user types @codex and is OWNER/MEMBER/COLLABORATOR
    if: |
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || github.event.review.author_association || github.event.issue.author_association) &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@codex')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@codex') || contains(github.event.issue.title, '@codex')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      branch: ${{ steps.push.outputs.branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are responding to a mention on GitHub repository ${{ github.repository }}.

            Context:
            - Event: ${{ github.event_name }}
            - Issue/PR number: ${{ github.event.issue.number || github.event.pull_request.number }}
            - Issue/PR title: ${{ github.event.issue.title || github.event.pull_request.title }}

            User request:
            ${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}

            If changes are needed, edit the files directly. Do NOT attempt to run git
            commands or push — the workflow will handle committing and creating a PR
            from any files you modify.

      - name: Check for changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch with changes
        id: push
        if: steps.diff.outputs.has_changes == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          BRANCH="codex/issue-${ISSUE_NUMBER}-$(date +%s)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "codex: implement changes for #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  post_response:
    runs-on: ubuntu-latest
    needs: codex
    if: always() && (needs.codex.outputs.final_message != '' || needs.codex.outputs.branch != '')
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post Codex response
        uses: actions/github-script@v7
        env:
          CODEX_RESPONSE: ${{ needs.codex.outputs.final_message }}
          BRANCH: ${{ needs.codex.outputs.branch }}
          REPO: ${{ github.repository }}
        with:
          script: |
            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;
            if (!issueNumber) return;

            let body = process.env.CODEX_RESPONSE || '';
            const branch = process.env.BRANCH;
            if (branch) {
              const repo = process.env.REPO;
              body += `\n\n---\nBranch with changes: [\`${branch}\`](https://github.com/${repo}/tree/${branch})`;
            }

            if (body.trim()) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: body.trim(),
              });
            }
